<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sign Up</title>

<link rel="stylesheet" href="css/style.css">

<style>

.form-container{
max-width:500px;
margin:60px auto;
background:white;
padding:40px;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

.form-container h1{
text-align:center;
margin-bottom:30px;
}

.form-group{
margin-bottom:20px;
}

.form-group label{
display:block;
margin-bottom:8px;
font-weight:600;
}

.form-group input,
.form-group select{
width:100%;
padding:12px;
border:1px solid #ccc;
border-radius:8px;
}

.submit-btn{
width:100%;
padding:14px;
border:none;
background:#22c55e;
color:white;
font-size:16px;
border-radius:8px;
cursor:pointer;
}

.login-link{
text-align:center;
margin-top:20px;
}

</style>

</head>

<body>

<div class="form-container">

<h1>Create Account</h1>

<form id="signupForm">

<div class="form-group">
<label>Full Name</label>
<input type="text" id="name" required>
</div>

<div class="form-group">
<label>Email</label>
<input type="email" id="email" required>
</div>

<div class="form-group">
<label>Password</label>
<input type="password" id="password" required>
</div>

<div class="form-group">
<label>Select Charity</label>

<select id="charity">

<option>Education Fund</option>

<option>Healthcare Fund</option>

<option>Environment Fund</option>

</select>

</div>

<button type="submit" class="submit-btn">
Create Account
</button>

</form>

<div class="login-link">

Already have an account?

<a href="login.html">
Login
</a>

</div>

</div>

<script src="js/auth.js"></script>

</body>
</html>
