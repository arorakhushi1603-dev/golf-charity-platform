<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Login</title>

<link rel="stylesheet"
href="css/style.css">

<style>

.form-container{
max-width:500px;
margin:60px auto;
background:white;
padding:40px;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

.form-container h1{
text-align:center;
margin-bottom:30px;
}

.form-group{
margin-bottom:20px;
}

.form-group label{
display:block;
margin-bottom:8px;
font-weight:600;
}

.form-group input{
width:100%;
padding:12px;
border:1px solid #ccc;
border-radius:8px;
}

.login-btn{
width:100%;
padding:14px;
background:#22c55e;
border:none;
color:white;
font-size:16px;
border-radius:8px;
cursor:pointer;
}

.signup-link{
text-align:center;
margin-top:20px;
}

</style>

</head>

<body>

<div class="form-container">

<h1>Login</h1>

<form id="loginForm">

<div class="form-group">

<label>Email</label>

<input
type="email"
id="loginEmail"
required>

</div>

<div class="form-group">

<label>Password</label>

<input
type="password"
id="loginPassword"
required>

</div>

<button
type="submit"
class="login-btn">

Login

</button>

</form>

<div class="signup-link">

Don't have an account?

<a href="signup.html">

Create Account

</a>

</div>

</div>

<script>

const loginForm =
document.getElementById("loginForm");

loginForm.addEventListener(
"submit",
function(e){

e.preventDefault();

const email =
document.getElementById(
"loginEmail"
).value;

const password =
document.getElementById(
"loginPassword"
).value;

const users =
jsON.parse(
localStorage.getItem("users")
) || [];

const user =
users.find(
u =>
u.email === email &&
u.password === password
);

if(user){

localStorage.setItem(
"currentUser",
jsON.stringify(user)
);

alert("Login Successful");

window.location.href =
"dashboard.html";

}
else{

alert(
"Invalid Email or Password"
);

}

});

</script>

</body>

</html>
