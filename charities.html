<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Charities</title>

<link rel="stylesheet" href="CSS/style.css">

<style>

.container{
max-width:1200px;
margin:50px auto;
padding:20px;
}

.title{
text-align:center;
margin-bottom:40px;
}

.charity-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:25px;
}

.charity-card{
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
text-align:center;
}

.charity-card h2{
margin-bottom:15px;
}

.charity-card p{
margin-bottom:20px;
}

.select-btn{
background:#22c55e;
color:white;
border:none;
padding:12px 20px;
border-radius:8px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<h1 class="title">
Choose Your Charity
</h1>

<div class="charity-grid">

<div class="charity-card">

<h2>Education Fund</h2>

<p>
Supporting education for children
and students.
</p>

<button
class="select-btn"
onclick="selectCharity('Education Fund')">

Select

</button>

</div>

<div class="charity-card">

<h2>Healthcare Fund</h2>

<p>
Providing healthcare support
for families in need.
</p>

<button
class="select-btn"
onclick="selectCharity('Healthcare Fund')">

Select

</button>

</div>

<div class="charity-card">

<h2>Environment Fund</h2>

<p>
Helping environmental and
tree plantation projects.
</p>

<button
class="select-btn"
onclick="selectCharity('Environment Fund')">

Select

</button>

</div>

</div>

</div>

<script src="JS/charity.js"></script>

</body>

</html>
