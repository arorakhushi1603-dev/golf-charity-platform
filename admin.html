<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Dashboard</title>

<link rel="stylesheet" href="CSS/style.css">

<style>

.container{
max-width:1200px;
margin:40px auto;
padding:20px;
}

.title{
text-align:center;
margin-bottom:30px;
}

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
margin-bottom:30px;
}

.card{
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
text-align:center;
}

.card h2{
font-size:30px;
color:#22c55e;
}

.draw-btn{
display:block;
margin:20px auto;
padding:14px 25px;
background:#22c55e;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
font-size:16px;
}

.draw-result{
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
margin-top:20px;
}

</style>

</head>

<body>

<div class="container">

<h1 class="title">
Admin Dashboard
</h1>

<div class="stats">

<div class="card">
<h3>Total Users</h3>
<h2 id="totalUsers">0</h2>
</div>

<div class="card">
<h3>Total Subscribers</h3>
<h2 id="totalSubscribers">0</h2>
</div>

<div class="card">
<h3>Total Scores</h3>
<h2 id="totalScores">0</h2>
</div>

</div>

<button
class="draw-btn"
onclick="generateDraw()">

Generate Monthly Draw

</button>

<div class="draw-result">

<h2>Draw Numbers</h2>

<p id="drawNumbers">
No draw generated yet.
</p>

</div>

</div>

<script src="JS/admin.js"></script>
<script src="JS/draw.js"></script>

</body>

</html>
