<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Subscription Plans</title>

<link rel="stylesheet"
href="css/style.css">

<style>

.container{
max-width:1200px;
margin:50px auto;
padding:20px;
}

.title{
text-align:center;
margin-bottom:40px;
}

.plan-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:30px;
}

.plan-card{
background:white;
padding:30px;
border-radius:15px;
text-align:center;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.plan-card h2{
margin-bottom:15px;
}

.price{
font-size:36px;
font-weight:bold;
color:#22c55e;
margin-bottom:20px;
}

.buy-btn{
background:#22c55e;
color:white;
border:none;
padding:12px 25px;
border-radius:8px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<h1 class="title">
Subscription Plans
</h1>

<div class="plan-grid">

<div class="plan-card">

<h2>Monthly Plan</h2>

<div class="price">
₹499
</div>

<p>Access Dashboard</p>
<p>Submit Golf Scores</p>
<p>Monthly Draw Entry</p>

<br>

<button
class="buy-btn"
onclick="buyPlan('Monthly')">

Buy Monthly

</button>

</div>

<div class="plan-card">

<h2>Yearly Plan</h2>

<div class="price">
₹4999
</div>

<p>Access Dashboard</p>
<p>Submit Golf Scores</p>
<p>Priority Support</p>
<p>Bonus Draw Entry</p>

<br>

<button
class="buy-btn"
onclick="buyPlan('Yearly')">

Buy Yearly

</button>

</div>

</div>

</div>

<script src="js/subscription.js"></script>

</body>

</html>
